<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>TikLocal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='output.css')}}">
    <script src="{{url_for('static', filename='feather.min.js')}}"></script>
    <style>
      /* A soft, content-first dock with page-aware material. */
      :root {
        --dock-surface: rgba(29, 29, 27, 0.86);
        --menu-surface: rgba(27, 27, 25, 0.94);
        --dock-border: rgba(255, 255, 255, 0.085);
        --dock-highlight: rgba(255, 255, 255, 0.055);
        --dock-ink: rgba(255, 255, 255, 0.54);
        --dock-active-ink: rgba(255, 255, 255, 0.96);
        --dock-active-soft: rgba(255, 255, 255, 0.1);
        --menu-hover: rgba(255, 255, 255, 0.075);
        --dock-shadow: 0 1px 2px rgba(0, 0, 0, 0.16), 0 9px 26px rgba(0, 0, 0, 0.14), 0 20px 52px rgba(0, 0, 0, 0.08);
      }

      [data-theme="light"] {
        --dock-surface: rgba(247, 246, 242, 0.9);
        --menu-surface: rgba(250, 249, 246, 0.96);
        --dock-border: rgba(20, 20, 18, 0.07);
        --dock-highlight: rgba(255, 255, 255, 0.72);
        --dock-ink: rgba(28, 28, 25, 0.48);
        --dock-active-ink: #1c1c19;
        --dock-active-soft: rgba(28, 28, 25, 0.075);
        --menu-hover: rgba(28, 28, 25, 0.055);
        --dock-shadow: 0 1px 2px rgba(23, 22, 18, 0.08), 0 8px 24px rgba(23, 22, 18, 0.11), 0 20px 48px rgba(23, 22, 18, 0.055);
      }

      [data-nav-context="index"] {
        --dock-surface: rgba(22, 22, 21, 0.72);
        --menu-surface: rgba(24, 24, 23, 0.92);
        --dock-border: rgba(255, 255, 255, 0.12);
        --dock-highlight: rgba(255, 255, 255, 0.07);
        --dock-ink: rgba(255, 255, 255, 0.58);
        --dock-active-ink: #fff;
        --dock-active-soft: rgba(255, 255, 255, 0.13);
        --menu-hover: rgba(255, 255, 255, 0.09);
      }

      [data-nav-context="radio"][data-theme="light"] {
        --dock-surface: rgba(238, 237, 231, 0.88);
        --menu-surface: rgba(244, 242, 235, 0.96);
        --dock-active-ink: #36594f;
        --dock-active-soft: rgba(70, 107, 97, 0.11);
      }

      [data-nav-context="radio"][data-theme="dark"] {
        --dock-surface: rgba(24, 26, 23, 0.86);
        --menu-surface: rgba(25, 28, 24, 0.95);
        --dock-active-ink: #b7cbbf;
        --dock-active-soft: rgba(159, 185, 173, 0.12);
      }

      .floating-dock {
        position: fixed;
        bottom: max(12px, env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        height: 58px;
        background: var(--dock-surface);
        backdrop-filter: blur(22px) saturate(118%);
        -webkit-backdrop-filter: blur(22px) saturate(118%);
        border: 1px solid var(--dock-border);
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 1px;
        z-index: 241;
        box-shadow: var(--dock-shadow), inset 0 1px 0 var(--dock-highlight);
        padding: 5px 7px;
        transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .dock-item {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        flex: 0 0 48px;
        color: var(--dock-ink);
        transition: color 160ms ease;
        background: transparent;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
      }

      .dock-item::before {
        content: '';
        position: absolute;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--dock-active-soft);
        opacity: 0;
        transform: scale(0.76);
        transition: opacity 150ms ease, transform 210ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .nav-icon {
        position: relative;
        z-index: 1;
        width: 22px;
        height: 22px;
        overflow: visible;
        transition: transform 210ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .nav-icon-outline,
      .nav-icon-filled {
        transform-origin: center;
        transition: opacity 150ms ease, transform 210ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .nav-icon-filled {
        opacity: 0;
        transform: scale(0.82);
      }
      .nav-icon-radio { width: 22.5px; height: 22.5px; transform: translateY(0.4px); }
      .nav-icon-library { width: 20.5px; height: 20.5px; }
      .nav-icon-more { width: 23px; height: 23px; }

      .dock-item.active,
      .dock-item[aria-expanded="true"] {
        color: var(--dock-active-ink);
      }
      .dock-item.active::before,
      .dock-item[aria-expanded="true"]::before {
        opacity: 1;
        transform: scale(1);
      }
      .dock-item.active .nav-icon-outline,
      .dock-item[aria-expanded="true"] .nav-icon-outline {
        opacity: 0;
        transform: scale(1.12);
      }
      .dock-item.active .nav-icon-filled,
      .dock-item[aria-expanded="true"] .nav-icon-filled {
        opacity: 1;
        transform: scale(1);
      }

      @media (hover: hover) {
        .dock-item:hover { color: var(--dock-active-ink); }
        .dock-item:hover::before { opacity: 0.55; transform: scale(1); }
        .dock-item::after {
          content: attr(data-label);
          position: absolute;
          bottom: calc(100% + 10px);
          left: 50%;
          padding: 5px 8px;
          border: 1px solid var(--dock-border);
          border-radius: 8px;
          color: var(--dock-active-ink);
          background: var(--menu-surface);
          box-shadow: 0 5px 16px rgba(0, 0, 0, 0.12);
          font-size: 11px;
          font-weight: 600;
          line-height: 1;
          white-space: nowrap;
          opacity: 0;
          pointer-events: none;
          transform: translate(-50%, 3px);
          transition: opacity 120ms ease, transform 150ms ease;
        }
        .dock-item:hover::after,
        .dock-item:focus-visible::after {
          opacity: 1;
          transform: translate(-50%, 0);
        }
        .dock-item[aria-expanded="true"]::after { opacity: 0; }
      }
      .dock-item:active .nav-icon {
        transform: scale(0.9);
      }
      .dock-item:focus-visible {
        outline: 2px solid var(--dock-active-ink);
        outline-offset: 2px;
      }

      .more-menu {
        position: fixed;
        inset: 0;
        z-index: 240;
        pointer-events: none;
      }
      .more-menu.is-open {
        pointer-events: auto;
      }
      .more-menu-card {
        position: absolute;
        right: max(16px, calc(50% - 109px));
        bottom: max(78px, calc(env(safe-area-inset-bottom) + 66px));
        width: 244px;
        padding: 7px;
        border: 1px solid var(--dock-border);
        border-radius: 18px;
        background: var(--menu-surface);
        color: var(--dock-active-ink);
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.1), 0 18px 52px rgba(0, 0, 0, 0.18), inset 0 1px 0 var(--dock-highlight);
        backdrop-filter: blur(24px) saturate(115%);
        -webkit-backdrop-filter: blur(24px) saturate(115%);
        opacity: 0;
        transform: translateY(7px) scale(0.94);
        transform-origin: bottom right;
        transition: opacity 140ms ease, transform 210ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .more-menu.is-open .more-menu-card {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .more-menu-item svg {
        width: 19px;
        height: 19px;
        flex: 0 0 auto;
        stroke-width: 2;
      }
      .more-menu-list {
        display: flex;
        flex-direction: column;
      }
      .more-menu-item {
        width: 100%;
        min-height: 48px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        border: 0;
        border-radius: 11px;
        color: var(--dock-ink);
        background: transparent;
        text-decoration: none;
        cursor: pointer;
        opacity: 0;
        transform: translateY(4px);
        transition: color 140ms ease, background-color 140ms ease, opacity 140ms ease, transform 180ms ease;
      }
      .more-menu.is-open .more-menu-item {
        opacity: 1;
        transform: translateY(0);
      }
      .more-menu.is-open .more-menu-item:nth-child(1) { transition-delay: 15ms; }
      .more-menu.is-open .more-menu-item:nth-child(2) { transition-delay: 30ms; }
      .more-menu.is-open .more-menu-item:nth-child(3) { transition-delay: 45ms; }
      .more-menu.is-open .more-menu-item:nth-child(5) { transition-delay: 60ms; }
      .more-menu.is-open .more-menu-item:nth-child(6) { transition-delay: 75ms; }
      @media (prefers-reduced-motion: reduce) {
        .more-menu-card, .more-menu-item, .nav-icon, .dock-item::before { transition-duration: 0.01ms !important; }
      }
      .more-menu-item:hover,
      .more-menu-item:focus-visible {
        color: var(--dock-active-ink);
        background: var(--menu-hover);
        outline: none;
      }
      .more-menu-item.is-active {
        color: var(--dock-active-ink);
        background: var(--menu-hover);
      }
      .more-menu-item span {
        font-size: 14.5px;
        font-weight: 590;
        letter-spacing: -0.01em;
      }
      .appearance-switch {
        margin-left: auto;
        position: relative;
        width: 58px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: space-around;
        border: 1px solid var(--dock-border);
        border-radius: 999px;
        color: var(--dock-ink);
        background: var(--menu-hover);
      }
      .appearance-switch::before {
        content: '';
        position: absolute;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--dock-active-soft);
        transform: translateX(0);
        transition: transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-theme="dark"] .appearance-switch::before {
        transform: translateX(28px);
      }
      .appearance-switch svg {
        position: relative;
        z-index: 1;
        width: 13px;
        height: 13px;
        stroke-width: 2;
      }
      .more-menu-divider {
        height: 1px;
        margin: 6px 12px;
        background: var(--dock-border);
      }

      /* Shared header for the lightweight Saved space. */
      [data-nav-context="favorite"] {
        --saved-bg: #f7f6f2;
        --saved-ink: #24231f;
        --saved-muted: rgba(35, 34, 30, 0.42);
        background:
          radial-gradient(circle at 50% -12rem, rgba(169, 151, 113, 0.075), transparent 30rem),
          var(--saved-bg) !important;
      }
      [data-nav-context="favorite"][data-theme="dark"] {
        --saved-bg: #11110f;
        --saved-ink: rgba(255, 255, 255, 0.95);
        --saved-muted: rgba(255, 255, 255, 0.38);
        background:
          radial-gradient(circle at 50% -12rem, rgba(179, 164, 126, 0.065), transparent 30rem),
          var(--saved-bg) !important;
      }
      body[data-nav-context="favorite"] {
        padding-bottom: calc(104px + env(safe-area-inset-bottom)) !important;
      }
      .saved-page {
        width: min(100%, 1040px);
        min-height: calc(100dvh - 104px - env(safe-area-inset-bottom));
        margin: 0 auto;
        padding: 10px 14px 8px;
      }
      .saved-content {
        width: 100%;
      }
      .saved-header {
        width: 100%;
        margin: 0 0 12px;
        padding: 12px 2px 0;
      }
      .saved-heading {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }
      .saved-eyebrow {
        margin: 0 0 3px;
        color: var(--saved-muted, rgba(35, 34, 30, 0.42));
        font-size: 10px;
        font-weight: 680;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .saved-title {
        margin: 0;
        color: var(--saved-ink, #24231f);
        font-size: clamp(22px, 4vw, 28px);
        font-weight: 680;
        letter-spacing: -0.035em;
        line-height: 1.08;
      }
      .saved-tabs {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 4px;
        border: 1px solid rgba(35, 34, 30, 0.055);
        border-radius: 14px;
        background: rgba(231, 230, 225, 0.64);
      }
      .saved-tab {
        min-width: 72px;
        padding: 7px 13px;
        border-radius: 10px;
        color: rgba(35, 34, 30, 0.56);
        font-size: 12px;
        font-weight: 590;
        line-height: 18px;
        text-align: center;
        text-decoration: none;
        transition: color 140ms ease, background-color 140ms ease, box-shadow 160ms ease, transform 120ms ease;
      }
      .saved-tab:hover { color: rgba(35, 34, 30, 0.9); }
      .saved-tab:active { transform: scale(0.97); }
      .saved-tab:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 2px;
      }
      .saved-tab.is-active {
        color: #24231f;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 1px 2px rgba(32, 30, 24, 0.09), 0 4px 12px rgba(32, 30, 24, 0.045);
      }
      [data-theme="dark"] .saved-eyebrow { color: rgba(255, 255, 255, 0.38); }
      [data-theme="dark"] .saved-title { color: rgba(255, 255, 255, 0.95); }
      [data-theme="dark"] .saved-tabs {
        border-color: rgba(255, 255, 255, 0.055);
        background: rgba(46, 46, 43, 0.72);
      }
      [data-theme="dark"] .saved-tab { color: rgba(255, 255, 255, 0.56); }
      [data-theme="dark"] .saved-tab:hover { color: rgba(255, 255, 255, 0.92); }
      [data-theme="dark"] .saved-tab.is-active {
        color: rgba(255, 255, 255, 0.96);
        background: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 2px 9px rgba(0, 0, 0, 0.12);
      }
      @media (prefers-reduced-motion: reduce) {
        .saved-tab { transition-duration: 0.01ms !important; }
      }
      @media (min-width: 768px) {
        .saved-page { padding-right: 18px; padding-left: 18px; }
      }

      /* Base layout adjustments */
      body {
        padding-bottom: 84px !important;
      }
      /* Special case for TikTok page which handles its own padding */
      body.immersive {
        padding-bottom: 0 !important;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body data-theme="{{ theme if theme else 'light' }}" data-nav-context="{{ menu or 'default' }}" class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen transition-colors duration-300">
    
    {% block content %}{% endblock %}
    
    <nav class="floating-dock" aria-label="主导航">
      <a href="/" class="dock-item {% if menu == 'index' %}active{% endif %}" data-label="推荐" aria-label="推荐" {% if menu == 'index' %}aria-current="page"{% endif %}>
        <svg class="nav-icon nav-icon-home" viewBox="0 0 24 24" aria-hidden="true">

          </g>
          <path class="nav-icon-filled" fill="currentColor" d="M11.2 2.95a1.25 1.25 0 0 1 1.6 0l8.2 6.67a1.05 1.05 0 0 1-.66 1.87h-.56v7.72c0 .72-.58 1.3-1.3 1.3h-4.3v-6.12H9.82v6.12h-4.3c-.72 0-1.3-.58-1.3-1.3v-7.72h-.56A1.05 1.05 0 0 1 3 9.62l8.2-6.67Z"></path>

      <a href="/radio" class="dock-item {% if menu == 'radio' %}active{% endif %}" data-label="电台" aria-label="电台" {% if menu == 'radio' %}aria-current="page"{% endif %}>
        <svg class="nav-icon nav-icon-radio" viewBox="0 0 24 24" aria-hidden="true">

      <a href="/library" class="dock-item {% if menu == 'library' %}active{% endif %}" data-label="媒体库" aria-label="媒体库" {% if menu == 'library' %}aria-current="page"{% endif %}>
        <svg class="nav-icon nav-icon-library" viewBox="0 0 24 24" aria-hidden="true">
          <g class="nav-icon-outline" fill="none" stroke="currentColor" stroke-width="1.9">
            <rect x="3.3" y="3.3" width="7.1" height="7.1" rx="1.7"></rect><rect x="13.6" y="3.3" width="7.1" height="7.1" rx="1.7"></rect><rect x="3.3" y="13.6" width="7.1" height="7.1" rx="1.7"></rect><rect x="13.6" y="13.6" width="7.1" height="7.1" rx="1.7"></rect>
          </g>
          <g class="nav-icon-filled" fill="currentColor">
            <rect x="2.8" y="2.8" width="7.8" height="7.8" rx="2"></rect><rect x="13.4" y="2.8" width="7.8" height="7.8" rx="2"></rect><rect x="2.8" y="13.4" width="7.8" height="7.8" rx="2"></rect><rect x="13.4" y="13.4" width="7.8" height="7.8" rx="2"></rect>
          </g>

      <button id="more-menu-trigger" type="button" class="dock-item {% if menu in ['favorite', 'download', 'settings'] %}active{% endif %}" data-label="更多" aria-label="更多" aria-expanded="false" aria-controls="more-menu">
        <svg class="nav-icon nav-icon-more" viewBox="0 0 24 24" aria-hidden="true">
          <g class="nav-icon-outline" fill="currentColor">
            <circle cx="5" cy="12" r="1.45"></circle><circle cx="12" cy="12" r="1.45"></circle><circle cx="19" cy="12" r="1.45"></circle>
          </g>
          <g class="nav-icon-filled" fill="currentColor">
            <circle cx="5" cy="12" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="19" cy="12" r="2"></circle>

    </nav>

    <div id="more-menu" class="more-menu" aria-hidden="true" inert>
      <nav class="more-menu-card" aria-label="更多导航">
        <div class="more-menu-list">
          <a href="/favorite" class="more-menu-item {% if request.path == '/favorite' or request.path == '/collections' or request.path.startswith('/collection/') %}is-active{% endif %}">
            <i data-feather="bookmark"></i><span>已保存</span>
          </a>
          <a href="/download" class="more-menu-item {% if menu == 'download' %}is-active{% endif %}">
            <i data-feather="download"></i><span>下载</span>
          </a>
          <div class="more-menu-divider" aria-hidden="true"></div>
          <a href="/settings" class="more-menu-item {% if menu == 'settings' %}is-active{% endif %}">
            <i data-feather="settings"></i><span>设置</span>
          </a>
        </div>
      </nav>
    </div>
    
    {% block extra_body %}{% endblock %}
    <script>
      // Theme Manager
      class ThemeManager {
        constructor() {
          this.init();
        }
        init() {
          this.mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          const savedTheme = localStorage.getItem('theme');
          this.preference = ['light', 'dark', 'system'].includes(savedTheme) ? savedTheme : 'system';
          this.apply();
          const onSystemThemeChange = () => {
            if (this.preference === 'system') this.apply();
          };
          if (this.mediaQuery.addEventListener) {
            this.mediaQuery.addEventListener('change', onSystemThemeChange);
          } else {
            this.mediaQuery.addListener?.(onSystemThemeChange);
          }
          feather.replace();
        }
        resolvedTheme() {
          return this.preference === 'system'
            ? (this.mediaQuery.matches ? 'dark' : 'light')
            : this.preference;
        }
        apply() {
          const resolved = this.resolvedTheme();
          document.body.setAttribute('data-theme', resolved);
          window.dispatchEvent(new CustomEvent('tiklocal:theme-changed', {
            detail: { preference: this.preference, resolved }
          }));
        }
        setPreference(preference) {
          if (!['light', 'dark', 'system'].includes(preference)) return;
          this.preference = preference;
          localStorage.setItem('theme', preference);
          this.apply();
        }
      }

      class MoreMenu {
        constructor() {
          this.menu = document.getElementById('more-menu');
          this.trigger = document.getElementById('more-menu-trigger');
          this.bindEvents();
        }
        isOpen() {
          return this.menu?.classList.contains('is-open');
        }
        open() {
          if (!this.menu || !this.trigger) return;
          this.menu.classList.add('is-open');
          this.menu.removeAttribute('inert');
          this.menu.setAttribute('aria-hidden', 'false');
          this.trigger.setAttribute('aria-expanded', 'true');
          this.menu.querySelector('a[href], button')?.focus();
        }
        close({ restoreFocus = true } = {}) {
          if (!this.menu || !this.trigger) return;
          this.menu.classList.remove('is-open');
          this.menu.setAttribute('inert', '');
          this.menu.setAttribute('aria-hidden', 'true');
          this.trigger.setAttribute('aria-expanded', 'false');
          if (restoreFocus) this.trigger.focus();
        }
        bindEvents() {
          this.trigger?.addEventListener('click', () => this.isOpen() ? this.close() : this.open());
          this.menu?.addEventListener('click', (event) => {
            if (event.target === this.menu) this.close();
          });
          document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && this.isOpen()) this.close();
          });
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        window.themeManager = new ThemeManager();
        new MoreMenu();
      });
    </script>
  </body>
